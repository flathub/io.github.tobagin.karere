app-id: io.github.tobagin.karere
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
command: karere
finish-args:
  - --share=network
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --talk-name=org.kde.StatusNotifierWatcher

  - --filesystem=xdg-download
  - --filesystem=xdg-run/pipewire-0

  # Audio for notification sounds and media
  - --socket=pulseaudio
  # Configure WebKit spell checker dictionary paths (bundled and runtime)
  - --env=WEBKIT_SPELL_CHECKER_DIR=/app/share/hunspell
  # Force GStreamer/WebKit to use PipeWire for camera
  - --env=GST_PLUGIN_FEATURE_RANK=pipewiresrc:MAX
  - --env=WEBRTC_USE_PIPEWIRE=1

sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable

cleanup:
  - /include
  - /lib/pkgconfig
  - /man
  - /share/doc
  - /share/gtk-doc
  - /share/man
  - /share/pkgconfig
  - '*.la'
  - '*.a'

build-options:
  append-path: /usr/lib/sdk/rust-stable/bin
  env:
    CARGO_HOME: /run/build/karere/cargo

modules:
  - name: hunspell-dictionaries
    buildsystem: simple
    build-commands:
      - mkdir -p /app/share/hunspell
      - |
        find . -type f \( -name "*.dic" -o -name "*.aff" \) ! -path "*/hyph_*" ! -path "*/.git/*" ! -path "*/util/*" | while read -r file; do
          filename=$(basename "$file")
          if [[ ! "$filename" =~ ^hyph_ ]]; then
            install -Dm644 "$file" "/app/share/hunspell/$filename"
          fi
        done
    sources:
      - type: archive
        url: https://github.com/LibreOffice/dictionaries/archive/refs/tags/libreoffice-26.2.2.2.zip
        sha256: 1cae55732af02d542ea28300b958bb5724e9a60cdd1711523f2df858cd2beac2

  - name: karere
    buildsystem: meson
    sources:
      - type: git
        url: https://github.com/tobagin/karere
        tag: v2.5.7
      - cargo-sources.json
