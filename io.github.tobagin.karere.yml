app-id: io.github.tobagin.karere
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
command: karere
appstream-compose: true

# Detached debug symbols extension; flatpak-builder fills /app/lib/debug from the
# unstripped binary (see Cargo.toml) to keep the base bundle small.
add-extensions:
  io.github.tobagin.karere.Debug:
    directory: lib/debug
    autodelete: true
    no-autodownload: true

# Drop dev-only artifacts Flathub flags. /lib/cef/include is NOT under /include,
# so CEF's headers (used by the embedded loader) survive the /include cleanup.
cleanup:
  - '*.la'
  - '*.a'
  - /include

build-options:
  append-path: /usr/lib/sdk/rust-stable/bin
  env:
    CARGO_HOME: /run/build/karere/cargo
    CARGO_NET_OFFLINE: 'true'
    CEF_PATH: /app/lib/cef
    # Cap parallel rustc jobs so the heavy crate graph doesn't OOM-kill (137).
    CARGO_BUILD_JOBS: '6'

finish-args:
  - --share=ipc
  - --share=network
  - --socket=wayland
  - --socket=fallback-x11
  - --socket=pulseaudio
  - --device=all
  # xdg-download (not home) passes the linter without a home-filesystem exception;
  # downloads land in ~/Downloads.
  - --filesystem=xdg-download
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.kde.StatusNotifierWatcher
  # Autostart goes through the XDG Background portal (ashpd) — no autostart
  # filesystem or portal.Desktop talk-name needed (portal busnames auto-granted).
  - --env=LD_LIBRARY_PATH=/app/lib/cef

modules:
  - name: cef-binaries
    buildsystem: simple
    build-commands:
      # Merge the CEF tarball into one flat layout (cmake prereqs + Release/ +
      # Resources/): cef-dll-sys build.rs cmakes this dir and copies root files
      # next to the binary, so build and runtime both need it merged.
      - mkdir -p /app/lib/cef
      - cp -a include libcef_dll cmake CMakeLists.txt /app/lib/cef/
      - cp -a Release/. /app/lib/cef/
      - cp -a Resources/. /app/lib/cef/
      - chmod +x /app/lib/cef/chrome-sandbox || true
      - install -Dm644 archive.json /app/lib/cef/archive.json
    sources:
      # Proprietary-codec CEF (H.264/AAC) from tools/build-cef-codecs.sh. C-API
      # compatible with the cef 149.3.0+149.0.6 bindings (CEF freezes its C API per
      # branch); archive.json carries the matching 149.0.6 name for the crate's check.
      - type: archive
        only-arches: [x86_64]
        url: https://github.com/tobagin/karere/releases/download/cef-149.0.6-proprietary-codecs/cef_binary_149.0.6%2Bg0d0eeb6%2Bchromium-149.0.7827.201_linux64_minimal.zip
        sha256: 5842bda0660124a31b6067e8a318fd91bae2a917b21da2529b4867b4515e5926
      - type: archive
        only-arches: [aarch64]
        url: https://github.com/tobagin/karere/releases/download/cef-149.0.6-proprietary-codecs/cef_binary_149.0.6%2Bg0d0eeb6%2Bchromium-149.0.7827.201_linuxarm64_minimal.zip
        sha256: 6aaa886225ad8fc6d035b259b05f89fdb2c1ce918e1cf7e03aa48f9409f90e09
      - type: inline
        only-arches: [x86_64]
        contents: |
          {"type":"minimal","name":"cef_binary_149.0.6+g0d0eeb6+chromium-149.0.7827.201_linux64_minimal.tar.bz2","sha1":"0000000000000000000000000000000000000000"}
        dest-filename: archive.json
      - type: inline
        only-arches: [aarch64]
        contents: |
          {"type":"minimal","name":"cef_binary_149.0.6+g0d0eeb6+chromium-149.0.7827.201_linuxarm64_minimal.tar.bz2","sha1":"0000000000000000000000000000000000000000"}
        dest-filename: archive.json

  - name: karere
    buildsystem: meson
    config-opts:
      - -Dprofile=default
    sources:
      # Flathub builds from the tagged GitHub release. The update-flatpak.yml
      # workflow rewrites `tag`/`commit` to the pushed stable tag when it opens
      # the Flathub PR; the values here are the last-synced placeholders. (Local
      # development builds use the Devel manifest, which sources `type: dir`.)
      - type: git
        url: https://github.com/tobagin/karere
        tag: v4.1.0
        commit: bdb6908dea83783635f560980fe7ccd87039b274
      - cargo-sources.json
    # Move our gettext catalogs out of share/locale so flatpak's automatic
    # per-language .Locale extension (which only deploys the host's languages)
    # doesn't strip the locales the in-app language picker offers.
    post-install:
      - mkdir -p ${FLATPAK_DEST}/share/karere
      - mv ${FLATPAK_DEST}/share/locale ${FLATPAK_DEST}/share/karere/locale
