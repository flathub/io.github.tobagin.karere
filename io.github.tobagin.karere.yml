app-id: io.github.tobagin.karere
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
command: karere
appstream-compose: true

add-extensions:
  io.github.tobagin.karere.Debug:
    directory: lib/debug
    autodelete: true
    no-autodownload: true

cleanup:
  - '*.la'
  - '*.a'
  - /include

build-options:
  append-path: /usr/lib/sdk/rust-stable/bin
  env:
    CARGO_HOME: /run/build/karere/cargo
    CARGO_NET_OFFLINE: 'true'
    CEF_PATH: /app/lib/cef
    CARGO_BUILD_JOBS: '6'

finish-args:
  - --share=ipc
  - --share=network
  - --socket=wayland
  - --socket=fallback-x11
  - --socket=pulseaudio
  - --device=all
  - --filesystem=xdg-download
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.kde.StatusNotifierWatcher
  - --env=LD_LIBRARY_PATH=/app/lib/cef
  - --env=GSK_RENDERER=gl

modules:
  - name: cef-binaries
    buildsystem: simple
    build-commands:
      - mkdir -p /app/lib/cef
      - cp -a include libcef_dll cmake CMakeLists.txt /app/lib/cef/
      - cp -a Release/. /app/lib/cef/
      - cp -a Resources/. /app/lib/cef/
      - chmod +x /app/lib/cef/chrome-sandbox || true
      - install -Dm644 archive.json /app/lib/cef/archive.json
    sources:
      - type: archive
        only-arches: [x86_64]
        url: https://github.com/tobagin/karere/releases/download/cef-150.0.10-proprietary-codecs/cef_binary_150.0.10%2Bg8042e43%2Bchromium-150.0.7871.101_linux64_minimal.zip
        sha256: 3bbe298368c4d87c19ad9b7ed4e8449ea91b32ffa3cefc8672791a1b96c9c3b9
      - type: archive
        only-arches: [aarch64]
        url: https://github.com/tobagin/karere/releases/download/cef-150.0.10-proprietary-codecs/cef_binary_150.0.10%2Bg8042e43%2Bchromium-150.0.7871.101_linuxarm64_minimal.zip
        sha256: 543bc10ce854fc39b0493ff8b369c47d65fa43f2fb974b734252eea805bffc53
      - type: inline
        only-arches: [x86_64]
        contents: |
          {"type":"minimal","name":"cef_binary_150.0.10+g8042e43+chromium-150.0.7871.101_linux64_minimal.tar.bz2","sha1":"0000000000000000000000000000000000000000"}
        dest-filename: archive.json
      - type: inline
        only-arches: [aarch64]
        contents: |
          {"type":"minimal","name":"cef_binary_150.0.10+g8042e43+chromium-150.0.7871.101_linuxarm64_minimal.tar.bz2","sha1":"0000000000000000000000000000000000000000"}
        dest-filename: archive.json

  - name: karere
    buildsystem: meson
    config-opts:
      - -Dprofile=default
    sources:
      - type: git
        url: https://github.com/tobagin/karere
        tag: v4.2.1
        commit: 6e1e6a3de35fb14cfb20cb0efe7488e14253ee1d
      - cargo-sources.json
    post-install:
      - mkdir -p ${FLATPAK_DEST}/share/karere
      - mv ${FLATPAK_DEST}/share/locale ${FLATPAK_DEST}/share/karere/locale
